<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贾维斯 (J.V) · 仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ═════════════ Apple-Style Glassmorphism 最小自定义样式 ═════════════ */
* { margin:0; padding:0; box-sizing:border-box; }

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.3; }
}

/* ECharts 容器 */
#echarts-graph { width:100%; height:480px; }

/* 面板显示/隐藏（Tailwind 不处理的逻辑） */
.panel { display: none; }
.panel.active { display: block; }

/* 模态框显示/隐藏 */
.modal-overlay { display: none; }
.modal-overlay.show { display: flex; }

/* 终端滚动条 */
.terminal::-webkit-scrollbar { width: 4px; }
.terminal::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 4px; }
.terminal::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 4px; }
.terminal::-webkit-scrollbar-thumb:hover { background: #6b7280; }

/* Mermaid 在亮色主题下的可读性 */
.mermaid svg text { fill: #374151 !important; }
.mermaid svg .edgeLabel rect { fill: #f9fafb !important; }
.mermaid svg .edgeLabel span { color: #374151 !important; }
</style>
</head>
<body class="bg-gray-50 antialiased text-gray-800 min-h-screen">

<header class="bg-white/70 backdrop-blur-md border-b border-white/40 shadow-sm px-8 py-4 flex items-center justify-between sticky top-0 z-50">
  <h1 class="text-xl font-semibold text-gray-900 tracking-tight">J.A.R.V.I.S <span class="text-sm font-normal text-gray-400 ml-2">诊断仪表盘 v1.0</span></h1>
  <div class="flex items-center gap-2 text-sm text-gray-500">
    <span class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_6px_rgba(16,185,129,0.5)] animate-[pulse_2s_ease-in-out_infinite]"></span>
    SYSTEM ONLINE
    <span id="ws-status" class="text-red-500">离线</span>
  </div>
</header>

<nav class="flex border-b border-white/40 bg-white/60 backdrop-blur-md px-8 sticky top-[65px] z-40">
  <button class="tab-btn active px-5 py-3 text-sm font-medium text-emerald-600 border-b-2 border-emerald-500 transition-all duration-200" data-tab="tab-skills">技能树</button>
  <button class="tab-btn px-5 py-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all duration-200" data-tab="tab-topology">Agent 拓扑</button>
  <button class="tab-btn px-5 py-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all duration-200" data-tab="tab-logs">实时日志</button>
</nav>

<!-- ═══════════ 技能树 ═══════════ -->
<div id="tab-skills" class="panel active px-8 py-6">
  <h2 class="text-sm font-semibold text-emerald-600 mb-5 tracking-wide">SKILL_MANIFEST</h2>
  <div id="skills-stats" class="flex gap-6 mb-6 p-4 bg-white/70 backdrop-blur-md border border-white/40 shadow-sm rounded-2xl"></div>
  <div id="skills-grid" class="grid grid-cols-[repeat(auto-fill,minmax(300px,1fr))] gap-4">
    <div class="text-center text-gray-400 py-10">LOADING…</div>
  </div>
  <div id="skill-modal" class="modal-overlay fixed inset-0 bg-black/30 backdrop-blur-sm z-[100] justify-center items-center"></div>
</div>

<!-- ═══════════ Agent 拓扑 ═══════════ -->
<div id="tab-topology" class="panel px-8 py-6">
  <h2 class="text-sm font-semibold text-emerald-600 mb-5 tracking-wide">AGENT_SWARM_TOPOLOGY</h2>
  <div id="topology-stats" class="flex gap-6 mb-6 p-4 bg-white/70 backdrop-blur-md border border-white/40 shadow-sm rounded-2xl"></div>
  <div class="topology-container bg-white/70 backdrop-blur-md border border-white/40 shadow-sm rounded-2xl p-6 min-h-[420px] overflow-hidden">
    <div id="mermaid-graph" class="text-center"><div class="text-center text-gray-400 py-10">LOADING…</div></div>
    <div id="echarts-graph"></div>
  </div>
</div>

<!-- ═══════════ 实时日志 ═══════════ -->
<div id="tab-logs" class="panel px-8 py-6">
  <h2 class="text-sm font-semibold text-emerald-600 mb-5 tracking-wide">LOG_STREAM /ws/logs</h2>
  <div class="bg-white/70 backdrop-blur-md border border-white/40 shadow-sm rounded-2xl p-4">
    <div class="flex gap-3 items-center mb-3">
      <span id="term-status" class="text-xs font-medium text-gray-400">CONNECTING…</span>
      <button class="px-4 py-1.5 text-sm font-medium text-gray-500 bg-white/80 border border-gray-200 rounded-lg hover:border-emerald-300 hover:text-emerald-600 hover:shadow-sm transition-all duration-200 hover:scale-105" onclick="clearTerminal()">CLEAR</button>
      <span id="line-count" class="text-xs text-gray-400">0 lines</span>
    </div>
    <div id="terminal" class="terminal bg-gray-50 rounded-xl h-[500px] overflow-y-auto p-4 font-mono text-sm leading-relaxed text-gray-700"></div>
  </div>
</div>

<script>
console.log("🚀 仪表盘前端脚本已加载...");

/* ═══════════════ 全局状态 ═══════════════ */
let topologyChart = null;

/* ═══════════════ TAB 切换 ═══════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('text-emerald-600', 'border-emerald-500');
      b.classList.add('text-gray-400', 'border-transparent');
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.remove('text-gray-400', 'border-transparent');
    btn.classList.add('text-emerald-600', 'border-emerald-500');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'tab-topology') initTopology();
    if (btn.dataset.tab === 'tab-logs') initLogStream();
  });
});

/* ═══════════════ 技能树 ═══════════════ */
async function loadSkills() {
  try {
    const res = await fetch('/api/skills');
    const data = await res.json();
    const skills = data.skills || [];
    renderSkills(skills);
    renderSkillStats(skills);
  } catch(e) {
    document.getElementById('skills-grid').innerHTML =
      '<div class="text-center text-red-500 py-10">加载失败</div>';
  }
}

function renderSkillStats(skills) {
  const total = skills.length;
  const withTools = skills.filter(s => s.tools && s.tools.length > 0).length;
  const executable = skills.filter(s => s.executable).length;
  document.getElementById('skills-stats').innerHTML = [
    {v: total, l: '技能总数'},
    {v: withTools, l: '含工具'},
    {v: executable, l: '可执行'},
  ].map(s => `<div class="flex flex-col"><span class="text-2xl font-bold text-emerald-600">${s.v}</span><span class="text-xs text-gray-400">${s.l}</span></div>`).join('');
}

function renderSkills(skills) {
  const grid = document.getElementById('skills-grid');
  if (!skills.length) {
    grid.innerHTML = '<div class="text-center text-gray-400 py-10">未注册任何技能</div>';
    return;
  }
  grid.innerHTML = skills.map(s => `
    <div class="bg-white/70 backdrop-blur-md border border-white/40 shadow-sm rounded-2xl p-5 cursor-pointer transition-all duration-200 hover:scale-[1.02] hover:shadow-lg" onclick="showSkillDetail(${JSON.stringify(s).replace(/"/g,'&quot;')})" data-skill='${JSON.stringify(s).replace(/'/g,'&#39;')}'>
      <div class="text-base font-semibold text-gray-900 mb-1">${esc(s.name)}</div>
      <div class="text-sm text-gray-500 leading-relaxed mb-3">${esc(s.description)}</div>
      <div class="flex flex-wrap gap-1.5">${(s.trigger_keywords||[]).slice(0,4).map(k => `<span class="text-xs px-2 py-0.5 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-full">${esc(k)}</span>`).join('')}</div>
      <div class="flex justify-between mt-3 text-xs text-gray-400">
        <span class="font-medium text-emerald-600">tools: ${(s.tools||[]).length}</span>
        <span>${s.executable ? '可执行' : ''}</span>
      </div>
    </div>
  `).join('');
}

function showSkillDetail(s) {
  const modal = document.getElementById('skill-modal');
  modal.innerHTML = `
    <div class="bg-white/90 backdrop-blur-md border border-white/40 shadow-xl rounded-2xl p-7 max-w-[500px] w-[90%]">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">${esc(s.name)}</h2>
      <div class="text-sm mb-3 text-gray-500"><span class="font-medium text-gray-700">描述</span><br>${esc(s.description)}</div>
      <div class="text-sm mb-3 text-gray-500"><span class="font-medium text-gray-700">触发词</span><br>${(s.trigger_keywords||[]).join(', ') || '无'}</div>
      <div class="text-sm mb-3 text-gray-500"><span class="font-medium text-gray-700">工具</span><br>${(s.tools||[]).join(', ') || '无'}</div>
      <div class="text-sm mb-4 text-gray-500"><span class="font-medium text-gray-700">可执行脚本</span><br>${esc(s.executable || '无')}</div>
      <button class="mt-2 px-5 py-2 text-sm font-medium text-gray-500 bg-white/80 border border-gray-200 rounded-lg hover:border-emerald-300 hover:text-emerald-600 hover:shadow-sm transition-all duration-200 hover:scale-105" onclick="this.closest('.modal-overlay').classList.remove('show')">CLOSE</button>
    </div>
  `;
  modal.classList.add('show');
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('show');
  }
});

/* ═══════════════ Agent 拓扑 ═══════════════ */

function getChartData(data) {
  const nodes = [{
    id: 'main',
    name: data.main_agent.name,
    symbolSize: 50,
    itemStyle: { color: '#10b981', shadowBlur: 10, shadowColor: 'rgba(16,185,129,0.4)' },
    category: 0,
    label: { show: true, fontSize: 13, color: '#10b981' }
  }];
  const edges = [];
  (data.sub_agents || []).forEach(sa => {
    nodes.push({
      id: sa.name,
      name: sa.name,
      symbolSize: 32,
      itemStyle: { color: '#14b8a6' },
      category: 1,
      label: { show: true, fontSize: 11, color: '#6b7280' }
    });
    edges.push({
      source: 'main',
      target: sa.name,
      lineStyle: { color: '#d1d5db', width: 1.5, curveness: 0.2 }
    });
  });
  return { nodes, edges };
}

function getChartOption(data) {
  const { nodes, edges } = getChartData(data);
  return {
    backgroundColor: 'transparent',
    tooltip: {
      formatter: p => p.dataType === 'node'
        ? `<b>${p.name}</b><br/>模型: ${(data.sub_agents||[]).find(s=>s.name===p.name)?.model||data.main_agent?.model||'N/A'}`
        : `${p.data.source} → ${p.data.target}`
    },
    series: [{
      type: 'graph',
      layout: 'force',
      force: { repulsion: 280, edgeLength: [180, 280], gravity: 0.08 },
      roam: true,
      draggable: true,
      data: nodes,
      edges: edges,
      categories: [
        { name: '主脑' },
        { name: '子Agent' }
      ]
    }]
  };
}

function initTopology() {
  fetch('/api/status')
    .then(r => r.json())
    .then(data => {
      if (data && data.main_agent) {
        renderTopology(data);
      }
    })
    .catch(e => {
      document.getElementById('mermaid-graph').innerHTML =
        '<div class="text-center text-red-500 py-10">拓扑加载失败</div>';
    });
}

function renderTopology(data) {
  if (!data || !data.main_agent) return;

  // 更新统计面板
  const statsHtml = [
    { v: data.agent_count, l: '在线 Agent' },
    { v: data.main_agent.model, l: '当前大脑' },
    { v: (data.sub_agents || []).length, l: '协作子机' }
  ].map(s => `
    <div class="flex flex-col">
      <span class="text-2xl font-bold text-emerald-600">${s.v}</span>
      <span class="text-xs text-gray-400">${s.l}</span>
    </div>
  `).join('');

  const statsBar = document.getElementById('topology-stats');
  if (statsBar) statsBar.innerHTML = statsHtml;

  // ECharts 单例模式
  const dom = document.getElementById('echarts-graph');
  if (!dom) return;

  if (!topologyChart) {
    topologyChart = echarts.init(dom);
    topologyChart.setOption(getChartOption(data));
    window.addEventListener('resize', () => topologyChart.resize());
  } else {
    const { nodes, edges } = getChartData(data);
    topologyChart.setOption({
      series: [{ data: nodes, edges: edges }]
    });
  }

  // Mermaid 图（仅在拓扑面板可见时渲染）
  const mermaidDiv = document.getElementById('mermaid-graph');
  if (mermaidDiv) {
    let mermaidCode = 'graph TD\n';
    mermaidCode += '  MAIN["' + (data.main_agent.name || 'JARVIS大脑') + '"]\n';
    (data.sub_agents || []).forEach(sa => {
      mermaidCode += `  MAIN --> ${sa.name.replace(/-/g,'_')}["${sa.name}"]\n`;
    });
    mermaidDiv.innerHTML = `<pre class="mermaid">${mermaidCode}</pre>`;
    try { mermaid.run({ nodes: [mermaidDiv.querySelector('.mermaid')] }); } catch(e) {}
  }
}

/* ═══════════════ 实时日志终端 ═══════════════ */
let wsLog = null;
let logLineCount = 0;

function initLogStream() {
  if (wsLog && wsLog.readyState === WebSocket.OPEN) return;
  connectLogStream();
}

function connectLogStream() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws/logs`;
  console.log("🔌 尝试连接 WebSocket:", url);

  wsLog = new WebSocket(url);
  const statusEl = document.getElementById('term-status');

  wsLog.onopen = () => {
    console.log("✅ WebSocket 连接成功！");
    document.getElementById('ws-status').innerHTML = '<span class="text-emerald-500">在线</span>';
    statusEl.textContent = '● CONNECTED';
    statusEl.className = 'text-xs font-medium text-emerald-500';
  };

  wsLog.onmessage = (e) => {
    updateLogs(e.data);
  };

  wsLog.onclose = () => {
    console.log("⚠ WebSocket 已关闭，3秒后重连...");
    document.getElementById('ws-status').innerHTML = '<span class="text-red-500">离线</span>';
    statusEl.textContent = '○ DISCONNECTED';
    statusEl.className = 'text-xs font-medium text-red-400';
    setTimeout(connectLogStream, 3000);
  };

  wsLog.onerror = (e) => {
    console.error("❌ WebSocket 报错:", e);
    document.getElementById('ws-status').innerHTML = '<span class="text-amber-500">错误</span>';
    statusEl.className = 'text-xs font-medium text-red-400';
    statusEl.textContent = '⚠ ERROR';
  };

  // 心跳
  setInterval(() => {
    if (wsLog && wsLog.readyState === WebSocket.OPEN) {
      wsLog.send('ping');
    }
  }, 15000);
}

function updateLogs(rawData) {
  try {
    const data = JSON.parse(rawData);
    if (data.type === "agent_status") {
      updateAgentStatus(data);
    } else {
      appendLogLine(data);
    }
  } catch(_) {}
  const term = document.getElementById('terminal');
  if (term) term.scrollTop = term.scrollHeight;
}

function updateAgentStatus(data) {
  const statsBar = document.getElementById('topology-stats');
  if (statsBar && data.main_agent) {
    statsBar.innerHTML = [
      {v: data.agent_count || 0, l: '在线 Agent'},
      {v: data.main_agent.model || 'N/A', l: '当前大脑'},
      {v: (data.sub_agents || []).length, l: '协作子机'},
    ].map(s => `<div class="flex flex-col"><span class="text-2xl font-bold text-emerald-600">${s.v}</span><span class="text-xs text-gray-400">${s.l}</span></div>`).join('');
  }
  // 始终尝试更新图表（不依赖 topologyLoaded）
  if (data.main_agent) {
    renderTopology(data);
  }
}

function appendLogLine(entry) {
  const term = document.getElementById('terminal');
  if (!term) return;

  const div = document.createElement('div');
  div.className = 'flex gap-3 text-sm leading-relaxed';

  const time = entry.time || '--:--:--';
  const timeShort = time.split(' ').pop() || time;
  const level = entry.level || 'INFO';

  const levelColor = {
    'INFO': 'text-emerald-600',
    'WARNING': 'text-amber-500',
    'ERROR': 'text-red-500'
  }[level] || 'text-gray-500';

  div.innerHTML = `
    <span class="text-gray-400 shrink-0 font-mono">${esc(timeShort)}</span>
    <span class="shrink-0 font-mono ${levelColor}">[${esc(level)}]</span>
    <span class="text-gray-700">${esc(entry.msg||'')}</span>
  `;

  term.appendChild(div);
  logLineCount++;

  while (term.children.length > 800) {
    term.removeChild(term.firstChild);
    logLineCount--;
  }

  document.getElementById('line-count').textContent = `${logLineCount} lines`;
  term.scrollTop = term.scrollHeight;
}

function clearTerminal() {
  const term = document.getElementById('terminal');
  term.innerHTML = '';
  logLineCount = 0;
  document.getElementById('line-count').textContent = '0 lines';
}

/* ═══════════════ 工具函数 ═══════════════ */
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════ 定时轮询：每 3 秒刷新状态与图表 ═══════════════ */
function startPolling() {
  setInterval(async () => {
    try {
      const response = await fetch('/api/status');
      const data = await response.json();
      if (data && data.main_agent) {
        renderTopology(data);
      }
    } catch (e) {
      console.warn('状态轮询失败:', e);
    }
  }, 3000);
}

/* ═══════════════ 启动 ═══════════════ */
mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
loadSkills();
startPolling();
</script>
</body>
</html>
